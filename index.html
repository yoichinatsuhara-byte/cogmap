<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex">
  <title>CogMap — 高次脳機能 統合プロファイル</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231e3a5f'/%3E%3Ctext x='32' y='45' font-family='Arial,Helvetica,sans-serif' font-size='36' font-weight='700' fill='%23ffffff' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="app-title">
      <h1>CogMap</h1>
      <span class="app-sub">高次脳機能 統合プロファイル（院内ローカル・非PII）</span>
    </div>
    <div class="current-case" id="current-case">ケース未選択</div>
  </header>

  <nav class="app-nav" id="app-nav" aria-label="画面切替"></nav>

  <main class="view" id="view"></main>

  <footer class="app-footer" id="app-footer">
    本ツールは評価結果の整理・共有を支援するものであり、診断や重症度の自動判定は行いません。判定は各検査マニュアルの基準に基づき評価者が入力してください。
  </footer>

  <!-- SPEC §3 のロード順（defer）。データ/可視化が未配置でも app.js が防御する。 -->
  <script defer src="data/domains.js"></script>
  <script defer src="data/assessments.js"></script>
  <script defer src="data/adl-map.js"></script>
  <script defer src="js/util.js"></script>
  <script defer src="js/store.js"></script>
  <script defer src="js/profile.js"></script>
  <script defer src="js/viz.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
